services:
  # 2번쨰 머신에서는 postgres 부분 주석처리
  postgres:
    image: postgres:18
    container_name: keycloak-db
    network_mode: host

    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak

    volumes:
      - postgres_data:/var/lib/postgresql

    # ports:
    #   - "5432:5432"
    # networks:
    #   - keycloak-net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    # 2026년 5월 4일 기준 가장 최신
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: keycloak
    network_mode: host

    # Keycloak 이미지의 ENTRYPOINT는 /opt/keycloak/bin/kc.sh 로 고정되어 있음
    # command로 오버라이드하면 kc.sh의 인자로 전달되므로 entrypoint를 교체해야 함
    entrypoint: ["/bin/bash", "-c", "/opt/keycloak/bin/kc.sh build && /opt/keycloak/bin/kc.sh start"]

    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: saltware1234

      # ── 클러스터링 핵심 설정 ──────────────────────────────
      # 서버 RAM의 50~70% 할당
      # jgroups.bind.port 기본 7800포트 
      JAVA_OPTS_APPEND: >-
        -Xms3g -Xmx3g
      # -Djgroups.bind.address=10.111.10.207
      # -Djgroups.tcpping.initial_hosts=10.111.10.207[7800],10.111.11.116[7800]

    volumes:
      # Keycloak은 /opt/keycloak/conf/keycloak.conf 를 자동으로 읽음
      - ./keycloak.conf:/opt/keycloak/conf/keycloak.conf

    # 폐쇠망은 보통 호스트로함 분리가 필요하면 브릿지 열고 이걸로하기 대신 jgruop ping이나 이런게 다른걸로 될수 있음
    # ports:
    #   - "8080:8080"
    #   - "7800:7800"
    #   - "9000:9000"
    # networks:
    #   - keycloak-net

    # 노드 2에서 주석처리할 것
    depends_on:
      postgres:
        condition: service_healthy

# networks:
#   keycloak-net:
#     driver: bridge

volumes:
  postgres_data: