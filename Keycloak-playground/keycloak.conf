# =============================================================================
# Keycloak 설정 파일
# =============================================================================

db=postgres
db-url=jdbc:postgresql://10.111.10.207:5432/keycloak
db-username=keycloak
db-password=keycloak
db-pool-min-size=5
# HA 2노드 기준: (100 × 0.8) ÷ 2 = 40
db-pool-max-size=40

# 앞단 LB가 SSL Termination하는 경우 이므로 true
http-enabled=true
http-port=8080
# edge 대신 헤더추가로 바뀜 26.x부터
# proxy=edge
proxy-headers=xforwarded

hostname=keycloak.seungdobae.com
# hostname Host 헤더가 hostname이랑 다르면 요청 거부
hostname-strict=true
# 백채널은 굳이 하지않음
hostname-strict-backchannel=false

# 캐시 복제 설정 (Infinispan 분산 캐시, 노드 간 세션 복제)
cache=ispn
cache-embedded-mtls-enabled=false

# 노드 디스커버리 방식
# tcp: TCPPING: 노드 IP/호스트를 직접 지정 (Docker Compose, IP 고정 환경) 그러나 곧 사라짐
# cache-stack=tcp
# jdbc-ping DB을 이용한 방식(권장)
cache-stack=jdbc-ping

log-level=INFO
log=console

# 헬스체크 엔드포인트 활성화
# /health, /health/ready, /health/live 엔드포인트 노출
health-enabled=true
