# Keycloak 기본 테마의 텍스트를 덮어쓰는 파일
# 여기에 없는 텍스트는 부모 테마(keycloak)의 messages_ko.properties 사용

# ── 브라우저 탭 제목 ──────────────────────────────────────
loginTitle=JTBC 통합 로그인
loginTitleHtml=JTBC 통합 로그인

# ── 로그인 폼 ─────────────────────────────────────────────
usernameOrEmail=아이디 또는 이메일
password=비밀번호
doLogIn=로그인
doSignIn=로그인

# ── 에러 메시지 ───────────────────────────────────────────
