services:

  # ──────────────────────────────────────────────
  # PostgreSQL: Keycloak의 모든 데이터를 저장하는 DB
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: keycloak-db

    environment:
      # Keycloak이 접속할 DB 이름/계정/비밀번호
      # 실제 운영에서는 Docker Secret 또는 Vault로 관리
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password

    volumes:
      # 컨테이너가 재시작되어도 데이터가 유지되도록 호스트에 마운트
      # 이게 없으면 컨테이너 삭제 시 모든 Realm/User/Client 설정이 날아감
      - postgres_data:/var/lib/postgresql/data

    networks:
      - keycloak-net

    # Keycloak이 DB 준비 전에 먼저 뜨면 연결 실패 → healthcheck로 순서 보장
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Keycloak: 인증 서버 본체
  # ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: keycloak

    # "start-dev": 개발 모드로 기동
    # - HTTP 허용 (운영에서는 HTTPS 필수)
    # - 캐시 최소화 (단일 노드, 클러스터링 없음)
    # - 운영 모드는 Phase 4에서 "start" 명령으로 전환
    command: start-dev

    environment:
      # ── DB 연결 설정 ──────────────────────────
      # KC_DB: 사용할 DB 종류. 기본값은 h2(인메모리)인데
      # h2는 재시작하면 데이터가 사라지므로 운영에서 절대 사용 금지
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password

      # ── 관리자 계정 ───────────────────────────
      # 최초 기동 시에만 적용됨. 이후 변경은 Admin Console에서
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_password

      # ── 호스트명 설정 ─────────────────────────
      # Keycloak이 발급하는 토큰의 issuer URL에 사용됨
      # 예: http://localhost:8080/realms/myrealm
      # 운영에서는 실제 도메인으로 변경 필수
      KC_HOSTNAME: localhost

      # ── 로그 레벨 ─────────────────────────────
      # INFO: 일반 운영 로그
      # DEBUG: 토큰 발급/검증 상세 로그 (학습 시 유용)
      KC_LOG_LEVEL: INFO

    ports:
      # 8080: Keycloak Admin Console 및 인증 엔드포인트
      # 형식: "호스트포트:컨테이너포트"
      - "8080:8080"

    volumes:
      # 커스텀 테마 마운트
      # Keycloak은 /opt/keycloak/themes/ 아래 디렉토리를 자동으로 테마로 인식
      - ./themes/jtbc:/opt/keycloak/themes/jtbc

    networks:
      - keycloak-net

    # postgres가 healthy 상태가 된 후에 Keycloak 기동
    depends_on:
      postgres:
        condition: service_healthy

# ──────────────────────────────────────────────
# 네트워크: keycloak과 postgres만 통신 가능한 격리된 네트워크
# 외부에서 postgres에 직접 접근 불가 (포트 노출 안 함)
# ──────────────────────────────────────────────
networks:
  keycloak-net:
    driver: bridge

# ──────────────────────────────────────────────
# 볼륨: 컨테이너 삭제 후에도 DB 데이터 유지
# ──────────────────────────────────────────────
volumes:
  postgres_data:
