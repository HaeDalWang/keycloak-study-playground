services:

  postgres:
    image: postgres:15
    container_name: keycloak-db-prod

    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - keycloak-net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: keycloak-prod

    # start-dev와의 핵심 차이:
    # 1. "build" 단계: keycloak.conf를 읽어 Quarkus 최적화 바이너리 생성
    # 2. "start" 단계: 최적화된 바이너리로 기동 (start-dev보다 빠름)
    #
    # Keycloak 이미지의 ENTRYPOINT는 /opt/keycloak/bin/kc.sh 로 고정되어 있음
    # command로 오버라이드하면 kc.sh의 인자로 전달되므로 entrypoint를 교체해야 함
    entrypoint: ["/bin/bash", "-c", "/opt/keycloak/bin/kc.sh build && /opt/keycloak/bin/kc.sh start"]

    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_password

      # JVM 힙 메모리 설정
      # 이 컨테이너는 테스트용이므로 512MB로 제한
      # 운영에서는 서버 RAM의 50~70% 할당
      JAVA_OPTS_APPEND: "-Xms512m -Xmx512m"

    volumes:
      # keycloak.conf를 컨테이너 내부 설정 경로에 마운트
      # Keycloak은 /opt/keycloak/conf/keycloak.conf 를 자동으로 읽음
      - ./keycloak.conf:/opt/keycloak/conf/keycloak.conf

    ports:
      - "8081:8080"  # 01-single-node(8080)와 포트 충돌 방지

    networks:
      - keycloak-net

    depends_on:
      postgres:
        condition: service_healthy

networks:
  keycloak-net:
    driver: bridge

volumes:
  postgres_data:
