# =============================================================================
# Keycloak 운영 환경 설정 파일
# 위치: /opt/keycloak/conf/keycloak.conf
# 적용: kc.sh build 실행 후 kc.sh start 로 기동
# =============================================================================

# ─────────────────────────────────────────────
# [1] 데이터베이스 설정
# ─────────────────────────────────────────────

# 사용할 DB 종류. 지원: postgres, mysql, mariadb, mssql, oracle
# 절대 기본값(h2) 사용 금지 - h2는 인메모리라 재시작 시 데이터 소멸
db=postgres

# JDBC 연결 URL
# 형식: jdbc:postgresql://<호스트>:<포트>/<DB명>
# 폐쇄망에서는 호스트명 대신 IP를 쓰는 것이 안전 (DNS 장애 방지)
# Docker Compose에서 컨테이너 간 통신은 서비스 이름을 호스트명으로 사용
# container_name이 아닌 services: 아래의 키 이름 (여기서는 "postgres")
db-url=jdbc:postgresql://postgres:5432/keycloak

# DB 접속 계정
db-username=keycloak
db-password=keycloak_password

# ── 커넥션 풀 설정 ──────────────────────────────
# 커넥션 풀이란: DB 연결을 미리 만들어두고 재사용하는 캐시
# 매 요청마다 DB 연결을 새로 맺으면 TCP 핸드셰이크 비용이 발생하므로
# 풀에서 꺼내 쓰고 반납하는 방식으로 성능을 높임

# 최소 유지 커넥션 수
# 트래픽이 없어도 이 수만큼은 항상 DB와 연결을 유지
# 너무 낮으면: 트래픽 급증 시 연결 맺는 시간만큼 지연 발생
# 권장: 예상 최소 동시 요청 수
db-pool-min-size=5

# 최대 커넥션 수 (핵심 설정)
# 계산 공식: PostgreSQL max_connections ÷ Keycloak 노드 수
# 예) PostgreSQL max_connections=100, 노드 2대 → 100 ÷ 2 = 50 (여유분 고려 40 권장)
# 이 값을 초과하면 요청이 대기 큐에 쌓이다가 타임아웃 발생
# Phase 4 HA 클러스터 구성 시 반드시 재계산 필요
db-pool-max-size=20

# 커넥션 유효성 검사 쿼리 실행 간격 (초)
# DB가 idle 커넥션을 끊어버리는 경우(방화벽 타임아웃 등)를 방지
# 폐쇄망에서는 방화벽이 일정 시간 후 세션을 끊는 경우가 많으므로 중요
db-pool-initial-size=5

# ─────────────────────────────────────────────
# [2] HTTP / HTTPS 설정
# ─────────────────────────────────────────────

# HTTP 활성화 여부
# 운영에서는 기본적으로 false (HTTPS만 허용)
# 단, 앞단에 SSL을 처리하는 로드밸런서(Nginx, HAProxy)가 있다면 true로 설정
# → 로드밸런서가 HTTPS를 받아서 Keycloak에는 HTTP로 전달하는 구조 (proxy=edge)
http-enabled=true
http-port=8080

# HTTPS 설정 (로드밸런서 없이 Keycloak이 직접 SSL 처리할 때)
# 인증서 파일 경로 (PEM 형식)
# https-certificate-file=/opt/keycloak/conf/tls.crt
# https-certificate-key-file=/opt/keycloak/conf/tls.key
# https-port=8443

# ─────────────────────────────────────────────
# [3] 프록시 설정 (폐쇄망 핵심 설정)
# ─────────────────────────────────────────────

# 앞단 프록시(로드밸런서)의 SSL 처리 방식을 Keycloak에 알려주는 설정
#
# edge       : 로드밸런서가 SSL 종료. Keycloak은 HTTP로 받음 (가장 일반적)
#              [클라이언트] --HTTPS--> [LB] --HTTP--> [Keycloak]
#
# reencrypt  : 로드밸런서가 SSL 종료 후 재암호화. Keycloak도 HTTPS로 받음
#              [클라이언트] --HTTPS--> [LB] --HTTPS--> [Keycloak]
#
# passthrough: 로드밸런서가 SSL을 그대로 통과. Keycloak이 직접 SSL 처리
#              [클라이언트] --HTTPS--> [LB] --HTTPS(원본)--> [Keycloak]
#
# none       : 프록시 없음. Keycloak이 직접 클라이언트와 통신
#
# 폐쇄망 데이터센터에서는 보통 Nginx/HAProxy를 앞단에 두고 edge 사용
proxy=edge

# ─────────────────────────────────────────────
# [4] 호스트명 설정
# ─────────────────────────────────────────────

# Keycloak이 발급하는 토큰의 issuer URL에 사용되는 호스트명
# 예) hostname=auth.jtbc.co.kr 이면
#     토큰의 iss 값 = https://auth.jtbc.co.kr/realms/jtbc
# 운영에서는 실제 도메인 또는 IP로 변경 필수
hostname=localhost

# strict 모드: hostname과 다른 Host 헤더로 오는 요청 거부
# true: 보안 강화 (운영 권장)
# false: 개발/테스트 시 편의를 위해 비활성화
# 로컬 테스트이므로 false. 운영에서는 반드시 true + 실제 도메인으로 변경
hostname-strict=false

# 백채널(서버 간 통신)에도 hostname-strict 적용 여부
hostname-strict-backchannel=false

# ─────────────────────────────────────────────
# [5] 캐시 설정 (클러스터링 관련)
# ─────────────────────────────────────────────

# 캐시 모드
# local    : 단일 노드. 캐시를 다른 노드와 공유하지 않음
# ispn     : Infinispan 분산 캐시. HA 클러스터 구성 시 사용
# 지금은 단일 노드이므로 local 사용
# Phase 4에서 ispn으로 변경하고 cache-ispn.xml을 상세 분석
cache=local

# 클러스터 노드 디스커버리 방식 (cache=ispn일 때만 유효)
# kubernetes : Kubernetes 환경
# ec2        : AWS EC2 환경 (멀티캐스트 불가)
# jdbc-ping  : DB를 통한 노드 디스커버리 (폐쇄망 필수)
# tcp        : TCP 유니캐스트 (IP 목록 직접 지정)
# 폐쇄망에서는 멀티캐스트 불가 → jdbc-ping 또는 tcp 사용
# cache-stack=jdbc-ping

# ─────────────────────────────────────────────
# [6] 로깅 설정
# ─────────────────────────────────────────────

# 로그 레벨
# ERROR   : 오류만
# WARN    : 경고 + 오류
# INFO    : 일반 운영 로그 (운영 권장)
# DEBUG   : 상세 로그 (토큰 발급/검증 흐름 추적 시 유용, 운영에서는 성능 저하)
# TRACE   : 매우 상세 (개발 디버깅 전용)
log-level=INFO

# 특정 패키지만 DEBUG로 올리는 방법 (운영 중 장애 추적 시 유용)
# 예) Keycloak 전체는 INFO, 인증 관련만 DEBUG
# log-level=INFO,org.keycloak.authentication:DEBUG

# 로그 출력 형식
# console : 표준 출력 (Docker/Kubernetes 환경 권장)
# file    : 파일 출력
# gelf    : Graylog/ELK 연동
log=console

# ─────────────────────────────────────────────
# [7] JVM 설정 (환경변수로 전달, 이 파일이 아닌 기동 스크립트에서 설정)
# ─────────────────────────────────────────────
# JAVA_OPTS_APPEND="-Xms512m -Xmx2048m"
#
# Xms: JVM 시작 시 할당할 최소 힙 메모리
# Xmx: JVM이 사용할 수 있는 최대 힙 메모리
#
# 메모리 계산 공식:
#   서버 전체 RAM의 50~70%를 Keycloak에 할당
#   Xms = Xmx로 동일하게 설정 (힙 크기 변동으로 인한 GC 부하 방지)
#
# 예) 서버 RAM 8GB → Xms=4g, Xmx=4g
# 나머지 4GB는 OS, Infinispan off-heap 캐시, 기타 프로세스용
