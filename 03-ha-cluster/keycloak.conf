# =============================================================================
# Keycloak HA 클러스터 설정 파일
# Phase 2의 단일 노드 설정에서 캐시 관련 항목만 변경
# =============================================================================

db=postgres
db-url=jdbc:postgresql://postgres:5432/keycloak
db-username=keycloak
db-password=keycloak_password
db-pool-min-size=5
# HA 2노드 기준: (100 × 0.8) ÷ 2 = 40
db-pool-max-size=40

http-enabled=true
http-port=8080
proxy=edge

hostname=localhost
hostname-strict=false
hostname-strict-backchannel=false

# ── Phase 2와 달라진 부분 ──────────────────────────────────
# Phase 2: cache=local  (단일 노드, 노드 간 공유 없음)
# Phase 4: cache=ispn   (Infinispan 분산 캐시, 노드 간 세션 복제)
cache=ispn

# 노드 디스커버리 방식
# tcp + TCPPING: 노드 IP/호스트를 직접 지정 (Docker Compose, IP 고정 환경)
# 실제 폐쇄망 운영 환경에서 JDBC_PING을 쓰려면 --cache-config-file로
# 커스텀 cache-ispn.xml을 제공해야 함 (Keycloak 24.x 제약)
cache-stack=tcp

log-level=INFO
log=console

# 헬스체크 엔드포인트 활성화
# /health, /health/ready, /health/live 엔드포인트 노출
# 운영에서 로드밸런서 헬스체크 및 컨테이너 오케스트레이터(K8s)에서 필수
health-enabled=true
