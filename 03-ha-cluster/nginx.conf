events {
    worker_connections 1024;
}

http {
    # ── 업스트림 정의: 트래픽을 분산할 Keycloak 노드 목록 ──────
    upstream keycloak_cluster {
        # least_conn: 현재 연결 수가 가장 적은 노드로 라우팅
        # (기본값 round-robin보다 부하 분산이 균등)
        least_conn;

        server keycloak-1:8080;
        server keycloak-2:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://keycloak_cluster;

            # ── 프록시 헤더 설정 (keycloak.conf의 proxy=edge와 연동) ──
            # Keycloak이 실제 클라이언트 IP와 프로토콜을 알 수 있도록 전달
            # 이 헤더가 없으면 Keycloak은 모든 요청이 nginx에서 온 것으로 인식
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 타임아웃 설정
            # Keycloak 기동 직후 첫 요청은 느릴 수 있으므로 여유있게 설정
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;

            # WebSocket 지원 (Keycloak Admin Console에서 사용)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
